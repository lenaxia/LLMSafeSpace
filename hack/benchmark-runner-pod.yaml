apiVersion: v1
kind: Pod
metadata:
  name: llmsafespace-benchmark
  namespace: default
  labels:
    app: llmsafespace-benchmark
spec:
  serviceAccountName: llmsafespace-controller  # reuse existing SA for kubectl access
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534  # nobody
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: runner
    image: alpine/k8s:1.31.0
    command: ["sleep", "3600"]
    env:
    - name: API_URL
      value: "http://llmsafespace-api:8080"
    - name: NS
      value: "default"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
    securityContext:
      readOnlyRootFilesystem: false  # benchmark scripts write to /tmp
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
