apiVersion: v1
kind: Pod
metadata:
  name: llmsafespaces-benchmark
  namespace: default
  labels:
    app: llmsafespaces-benchmark
spec:
  serviceAccountName: llmsafespaces-controller  # reuse existing SA for kubectl access
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534  # nobody
    seccompProfile:
      type: RuntimeDefault
  volumes:
  - name: tmp
    emptyDir: {}
  containers:
  - name: runner
    image: alpine/k8s:1.31.0
    command: ["sleep", "3600"]
    env:
    - name: API_URL
      value: "http://llmsafespaces-api:8080"
    - name: NS
      value: "default"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
    securityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
    volumeMounts:
    - name: tmp
      mountPath: /tmp
