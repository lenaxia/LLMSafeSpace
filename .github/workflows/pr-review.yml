name: PR Review

on:
  pull_request:
    types: [opened]

jobs:
  review:
    # Skip renovate[bot] PRs — handled by renovate-analysis.yml
    if: github.event.pull_request.user.login != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build prompt
        run: |
          set -euo pipefail
          {
            echo "OPENCODE_PROMPT<<__PROMPT_EOF__"
            cat .github/prompts/context.md
            printf '\n\n'
            cat .github/prompts/pr-review.md
            printf '\n\nA new pull request has been opened. Perform a thorough review and post your findings as a PR review comment.\n'
            echo "__PROMPT_EOF__"
          } >> "$GITHUB_ENV"

      - name: Install opencode
        shell: bash
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Run OpenCode
        shell: bash
        run: opencode github run
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: openai-compatible/default
          PROMPT: ${{ env.OPENCODE_PROMPT }}
          SHARE: "false"
          USE_GITHUB_TOKEN: "true"
