name: Issue Opened

on:
  issues:
    types: [opened]

jobs:
  respond:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build prompt
        run: |
          set -euo pipefail
          {
            echo "OPENCODE_PROMPT<<__PROMPT_EOF__"
            cat .github/prompts/context.md
            printf '\n\n'
            cat .github/prompts/issue-responder.md
            printf '\n\nA new GitHub issue has been opened. Analyze it and take the appropriate action.\n'
            echo "__PROMPT_EOF__"
          } >> "$GITHUB_ENV"

      - name: Install opencode
        shell: bash
        run: |
          for i in 1 2 3; do
            curl -fsSL https://opencode.ai/install | bash && break
            wait=$((2 ** i * 5 + RANDOM % 10))
            echo "Install attempt $i failed. Retrying in ${wait}s..."
            sleep $wait
          done

      - name: Run OpenCode
        shell: bash
        run: opencode github run
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: openai-compatible/default
          PROMPT: ${{ env.OPENCODE_PROMPT }}
          SHARE: "false"
          USE_GITHUB_TOKEN: "true"
