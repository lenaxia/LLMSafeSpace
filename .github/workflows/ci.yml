name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: lenaxia/llmsafespace/api
  CONTROLLER_IMAGE: lenaxia/llmsafespace/controller
  RUNTIME_IMAGE: lenaxia/llmsafespace/base
  FRONTEND_IMAGE: lenaxia/llmsafespace/frontend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run tests
        run: go test -timeout 120s -race -short ./...

      - name: Run go vet
        run: go vet ./...

      - name: Validate OpenAPI spec
        run: make openapi-validate

  sdk-contract:
    name: SDK Contract Tests
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: llmsafespace
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: llmsafespace
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run DB migrations
        env:
          DATABASE_URL: postgres://llmsafespace:testpass@localhost:5432/llmsafespace?sslmode=disable
        run: |
          for f in api/migrations/*.up.sql; do
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Build and start API server
        env:
          LLMSAFESPACE_SERVER_HOST: 0.0.0.0
          LLMSAFESPACE_SERVER_PORT: "8080"
          LLMSAFESPACE_DATABASE_HOST: localhost
          LLMSAFESPACE_DATABASE_PORT: "5432"
          LLMSAFESPACE_DATABASE_USER: llmsafespace
          LLMSAFESPACE_DATABASE_PASSWORD: testpass
          LLMSAFESPACE_DATABASE_DATABASE: llmsafespace
          LLMSAFESPACE_DATABASE_SSLMODE: disable
          LLMSAFESPACE_REDIS_HOST: localhost
          LLMSAFESPACE_REDIS_PORT: "6379"
          LLMSAFESPACE_AUTH_JWTSECRET: ci-test-secret-32-chars-minimum!!
          LLMSAFESPACE_LOGGING_DEVELOPMENT: "true"
        run: |
          go build -o /tmp/api-server ./api/cmd/api/
          /tmp/api-server &
          # Wait for API to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/livez > /dev/null 2>&1; then
              echo "API ready"
              break
            fi
            sleep 1
          done

      - name: Create test user and API key
        run: |
          # Register a test user
          RESP=$(curl -sf -X POST http://localhost:8080/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"ci-test","email":"ci@test.com","password":"testpass123"}')
          TOKEN=$(echo "$RESP" | jq -r '.token')

          # Create an API key
          KEY_RESP=$(curl -sf -X POST http://localhost:8080/api/v1/auth/api-keys \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"ci-sdk-test"}')
          API_KEY=$(echo "$KEY_RESP" | jq -r '.key')

          echo "API_KEY=$API_KEY" >> "$GITHUB_ENV"
          echo "API_URL=http://localhost:8080" >> "$GITHUB_ENV"

      - name: Go SDK contract test
        working-directory: sdks/go
        run: |
          go test -timeout 30s -race ./...

      - name: TypeScript SDK install and test
        working-directory: sdks/typescript
        run: |
          npm ci
          npx vitest run

      - name: Python SDK install and test
        working-directory: sdks/python
        run: |
          pip install -e ".[dev]" -q
          pytest tests/test_client.py -q

  # Compute a single unix timestamp shared by all image-build jobs in this run
  # so every artifact built from one workflow invocation carries the same
  # `ts-<unix>` tag. Sortable lexicographically as a 10-digit number until
  # 2286-11-20 (year 9999999999 fits in 10 digits through 2286). Combined with
  # `sha-<commit>` for content addressability and `dev` for the moving pointer
  # to the latest main build. Tagged releases (v1.2.3) emit semver tags.
  prepare:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.timestamp }}
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%s)" >> "$GITHUB_OUTPUT"

  build-api:
    name: Build API
    needs: [test, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=ts-${{ needs.prepare.outputs.timestamp }}
            type=raw,value=dev,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-controller:
    name: Build Controller
    needs: [test, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=ts-${{ needs.prepare.outputs.timestamp }}
            type=raw,value=dev,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: controller/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-runtime:
    name: Build Runtime Base
    needs: [test, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=ts-${{ needs.prepare.outputs.timestamp }}
            type=raw,value=dev,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: runtimes/base/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=ts-${{ needs.prepare.outputs.timestamp }}
            type=raw,value=dev,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
