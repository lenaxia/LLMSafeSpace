name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: lenaxia/llmsafespace/api
  CONTROLLER_IMAGE: lenaxia/llmsafespace/controller
  RUNTIME_IMAGE: lenaxia/llmsafespace/base
  FRONTEND_IMAGE: lenaxia/llmsafespace/frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # repolint catches the failure modes that have caused production
      # incidents: duplicate migration version numbers, drift between
      # api/migrations/ and charts/llmsafespace/migrations/, and
      # duplicate worklog numbers. See worklog 0098.
      - name: Repository layout lint
        run: make repolint

      # gofmt: blocks PRs containing un-formatted Go. The Makefile target
      # writes the offending files to stdout and exits non-zero.
      - name: gofmt
        run: make fmt-check

      # goimports: blocks PRs with incorrect import grouping or unused
      # imports. Same enforcement model as gofmt.
      - name: goimports
        run: make imports-check

      # go vet runs as part of golangci-lint (`govet` linter), but is
      # cheap enough to keep here as an explicit fast-fail too.
      - name: go vet
        run: go vet ./...

      # golangci-lint with the curated ruleset in .golangci.yml. Catches
      # the audit-cycle bugs that pre-merge automation could have caught
      # mechanically (errcheck, bodyclose, sqlclosecheck, contextcheck,
      # gosec, staticcheck, etc.). See worklog 0101 for the rationale.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      # Helm chart sanity: chart lints and `helm template` succeeds with
      # the bundled values. Catches undefined-value references and
      # template syntax errors before they break a deploy.
      - name: helm-render
        run: |
          curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          make helm-render

  test:
    name: Test (-short, with coverage)
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      pull-requests: write    # for posting coverage delta as a comment
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch base ref so the coverage-delta comparison can resolve
          # `git merge-base origin/main HEAD`. Default depth=1 doesn't
          # include the base commit, breaking the comparison.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # Coverage-instrumented test run. -coverpkg=./... means we count
      # coverage for ALL packages, even those without their own _test.go
      # (so a function in pkg/utilities that's exercised by an
      # api/internal/handlers test is properly attributed).
      - name: Run tests with coverage
        run: |
          go test -timeout 300s -race -short \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./... \
            ./...

      - name: Show coverage summary
        run: |
          go tool cover -func=coverage.out | tail -1

      # Hard floor: 50% (current is 51.5% as of worklog 0101). The floor
      # is INTENTIONALLY a hair below current to absorb noise from
      # generated mocks; raise it deliberately as coverage grows.
      - name: Enforce coverage floor (50%)
        run: |
          set -euo pipefail
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          # Use awk for floating-point comparison (bash can't do < for floats)
          if awk -v t="$total" 'BEGIN { exit !(t < 50) }'; then
            echo "FAIL: total coverage ${total}% is below the 50.0% floor."
            echo "If you removed tests, please revisit. If you added uncovered"
            echo "code, write tests. The floor lives in .github/workflows/ci.yml"
            echo "and exists to make coverage regressions visible."
            exit 1
          fi
          echo "OK: total coverage ${total}% (floor 50.0%)"

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 7

      # Post a coverage delta comment on PRs. Requires the base branch's
      # coverage; we generate it freshly rather than caching to keep the
      # comparison apples-to-apples.
      - name: Compare coverage against base
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          base_sha=$(git merge-base origin/main HEAD)
          echo "Base: $base_sha"

          # Generate base coverage in a worktree so we don't disturb HEAD.
          git worktree add /tmp/base-tree "$base_sha"
          (cd /tmp/base-tree && \
            go test -timeout 300s -race -short \
              -coverprofile=coverage-base.out \
              -covermode=atomic \
              -coverpkg=./... \
              ./... 2>/dev/null) || true
          base_total=$(go tool cover -func=/tmp/base-tree/coverage-base.out | awk '/^total:/ {print $3}' | tr -d '%')
          new_total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          delta=$(awk -v b="$base_total" -v n="$new_total" 'BEGIN { printf "%.2f", n - b }')
          echo "base=${base_total}%  new=${new_total}%  delta=${delta}%"
          {
            echo "COVERAGE_BASE=$base_total"
            echo "COVERAGE_NEW=$new_total"
            echo "COVERAGE_DELTA=$delta"
          } >> "$GITHUB_ENV"

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const base = process.env.COVERAGE_BASE;
            const newC = process.env.COVERAGE_NEW;
            const delta = parseFloat(process.env.COVERAGE_DELTA);
            const sign = delta >= 0 ? '+' : '';
            const emoji = delta >= 0 ? ':white_check_mark:' : ':warning:';
            const body = `## ${emoji} Coverage report\n\n` +
              `| | Coverage |\n` +
              `|---|---|\n` +
              `| base | ${base}% |\n` +
              `| this PR | ${newC}% |\n` +
              `| delta | ${sign}${delta}% |\n\n` +
              `_Floor: 50% (enforced). See .github/workflows/ci.yml._`;

            // Find any existing coverage comment and update it instead
            // of posting a new one each push.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## :white_check_mark: Coverage report') ||
              c.user.type === 'Bot' && c.body.startsWith('## :warning: Coverage report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Run go vet
        run: go vet ./...

      - name: Validate OpenAPI spec
        run: make openapi-validate

  # Full-suite test (no -short). The fast `test` job above is sufficient
  # for most PR feedback; this job runs the long tests too, with the race
  # detector. Lives in a separate job so it doesn't gate the fast path
  # but still blocks merge.
  #
  # Why split: today the codebase doesn't actually have any
  # -short-skipped tests, but the gate exists so future contributors
  # can add expensive tests behind `if testing.Short()` without losing
  # CI coverage on them.
  test-full:
    name: Test (full suite, race detector)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run full test suite with race detector
        run: |
          go test -timeout 600s -race -count=1 ./...

  sdk-contract:
    name: SDK Contract Tests
    runs-on: ubuntu-latest
    needs: [test, test-full]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Go SDK — build and test
        working-directory: sdks/go
        run: |
          go build ./...
          go test -timeout 30s -race ./...

      - name: TypeScript SDK — install, typecheck, test, build
        working-directory: sdks/typescript
        run: |
          npm ci
          npx tsc --noEmit
          npx vitest run
          npx tsup src/index.ts --format esm,cjs --dts

      - name: Python SDK — install and test
        working-directory: sdks/python
        run: |
          pip install -e ".[dev]" -q
          pytest tests/test_client.py -q

      - name: VS Code extension — install, typecheck, build
        working-directory: sdks/vscode-llmsafespace
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

  # Compute a single unix timestamp shared by all image-build jobs in this run
  # so every artifact built from one workflow invocation carries the same
  # `ts-<unix>` tag. Sortable lexicographically as a 10-digit number until
  # 2286-11-20 (year 9999999999 fits in 10 digits through 2286). Combined with
  # `sha-<commit>` for content addressability and `dev` for the moving pointer
  # to the latest main build. Tagged releases (v1.2.3) emit semver tags.
  prepare:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.timestamp }}
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%s)" >> "$GITHUB_OUTPUT"

  build-api:
    name: Build API (${{ matrix.platform }})
    needs: [test, test-full, prepare]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: api/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.API_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=api-${{ matrix.platform }}
          cache-to: type=gha,scope=api-${{ matrix.platform }},mode=max

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: api-digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-api:
    name: Merge API Manifest
    needs: [build-api, prepare]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: api-digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=ts-${{ needs.prepare.outputs.timestamp }}
            type=raw,value=dev,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.API_IMAGE }}@sha256:%s ' *)

  build-controller:
    name: Build Controller (${{ matrix.platform }})
    needs: [test, test-full, prepare]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: controller/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=controller-${{ matrix.platform }}
          cache-to: type=gha,scope=controller-${{ matrix.platform }},mode=max

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: controller-digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-controller:
    name: Merge Controller Manifest
    needs: [build-controller, prepare]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: controller-digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=ts-${{ needs.prepare.outputs.timestamp }}
            type=raw,value=dev,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE }}@sha256:%s ' *)

  build-runtime:
    name: Build Runtime Base (${{ matrix.platform }})
    needs: [test, test-full, prepare]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: runtimes/base/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=runtime-${{ matrix.platform }}
          cache-to: type=gha,scope=runtime-${{ matrix.platform }},mode=max

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: runtime-digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-runtime:
    name: Merge Runtime Manifest
    needs: [build-runtime, prepare]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: runtime-digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=ts-${{ needs.prepare.outputs.timestamp }}
            type=raw,value=dev,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE }}@sha256:%s ' *)

  build-frontend:
    name: Build Frontend (${{ matrix.platform }})
    needs: [prepare]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: ./frontend
          file: frontend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=frontend-${{ matrix.platform }}
          cache-to: type=gha,scope=frontend-${{ matrix.platform }},mode=max

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-frontend:
    name: Merge Frontend Manifest
    needs: [build-frontend, prepare]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: frontend-digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=ts-${{ needs.prepare.outputs.timestamp }}
            type=raw,value=dev,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}@sha256:%s ' *)
