apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workspaces.llmsafespace.dev
spec:
  group: llmsafespace.dev
  names:
    kind: Workspace
    plural: workspaces
    singular: workspace
    shortNames:
      - ws
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - owner
                - runtime
                - storage
              properties:
                owner:
                  type: object
                  required:
                    - userID
                  properties:
                    userID:
                      type: string
                runtime:
                  type: string
                  description: "Runtime environment (e.g. python:3.11)"
                securityLevel:
                  type: string
                  enum: ["standard", "high"]
                  default: "standard"
                storage:
                  type: object
                  required:
                    - size
                  properties:
                    size:
                      type: string
                      pattern: "^[0-9]+(Gi|Mi)$"
                    storageClassName:
                      type: string
                    accessMode:
                      type: string
                      enum: ["ReadWriteOnce", "ReadWriteMany"]
                      default: "ReadWriteOnce"
                networkAccess:
                  type: object
                  properties:
                    egress:
                      type: array
                      items:
                        type: object
                        required: [domain]
                        properties:
                          domain:
                            type: string
                    ingress:
                      type: boolean
                      default: false
                autoSuspend:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    idleTimeoutSeconds:
                      type: integer
                      minimum: 1
                      default: 3600
                ttlSecondsAfterSuspended:
                  type: integer
                  minimum: 0
                  default: 0
                packages:
                  type: array
                  items:
                    type: object
                    required: [runtime, requirements]
                    properties:
                      runtime:
                        type: string
                      requirements:
                        type: array
                        items:
                          type: string
                initScript:
                  type: string
                maxActiveSessions:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 5
                credentials:
                  type: object
                  properties:
                    secretName:
                      type: string
                timeout:
                  type: integer
                  minimum: 0
                  maximum: 86400
                  default: 0
                  description: "Max pod lifetime in seconds. 0 = no limit."
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                      default: "500m"
                    memory:
                      type: string
                      default: "512Mi"
                    ephemeralStorage:
                      type: string
                      default: "1Gi"
                    cpuPinning:
                      type: boolean
                      default: false
                restartGeneration:
                  type: integer
                  format: int64
                  default: 0
                maxRetries:
                  type: integer
                  minimum: 0
                  maximum: 10
                  default: 3
                podSecurityContext:
                  type: object
                  properties:
                    runAsUser:
                      type: integer
                      format: int64
                    runAsGroup:
                      type: integer
                      format: int64
                    seccompProfile:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - "Pending"
                    - "Creating"
                    - "Active"
                    - "Suspending"
                    - "Suspended"
                    - "Resuming"
                    - "Terminating"
                    - "Terminated"
                    - "Failed"
                pvcName:
                  type: string
                activeSessions:
                  type: integer
                lastActivityAt:
                  type: string
                  format: date-time
                suspendedAt:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                message:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                podName:
                  type: string
                podNamespace:
                  type: string
                podIP:
                  type: string
                endpoint:
                  type: string
                startTime:
                  type: string
                  format: date-time
                restartCount:
                  type: integer
                  format: int32
                transientFailureCount:
                  type: integer
                  format: int32
                lastTransientFailureAt:
                  type: string
                  format: date-time
                observedRestartGeneration:
                  type: integer
                  format: int64
                credentialSecretHash:
                  type: string
                lastHealthCheckAt:
                  type: string
                  format: date-time
                consecutiveHealthFailures:
                  type: integer
                  format: int32
                sessions:
                  type: array
                  items:
                    type: object
                    required: [id, status]
                    properties:
                      id:
                        type: string
                      title:
                        type: string
                      status:
                        type: string
                        enum: ["idle", "busy"]
                diskUsedBytes:
                  type: integer
                  format: int64
                diskTotalBytes:
                  type: integer
                  format: int64
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Runtime
          type: string
          jsonPath: .spec.runtime
        - name: Storage
          type: string
          jsonPath: .spec.storage.size
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
