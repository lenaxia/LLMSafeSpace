{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmsafespace.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespace.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "llmsafespace.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmsafespace.api.selectorLabels" . | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-api.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "llmsafespace.api.serviceAccountName" . }}
      {{- with .Values.api.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "llmsafespace.api.image" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.config.server.port }}
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: /etc/llmsafespace/config.yaml
            - name: LLMSAFESPACE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespace.secretName" . }}
                  key: postgres-password
            - name: LLMSAFESPACE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespace.secretName" . }}
                  key: redis-password
                  optional: true
            - name: LLMSAFESPACE_AUTH_JWTSECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespace.secretName" . }}
                  key: jwt-secret
            - name: LLMSAFESPACE_MASTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespace.secretName" . }}
                  key: master-secret
            - name: LLMSAFESPACE_KUBERNETES_PODNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/llmsafespace
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "llmsafespace.fullname" . }}-api-config
        - name: tmp
          emptyDir: {}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
