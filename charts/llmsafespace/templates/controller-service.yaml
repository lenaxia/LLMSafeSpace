{{- if .Values.controller.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llmsafespace.fullname" . }}-controller-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespace.controller.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.controller.metricsAddr | trimPrefix ":" | atoi }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "llmsafespace.controller.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llmsafespace.fullname" . }}-controller-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespace.controller.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: webhook
      port: 443
      targetPort: webhook
      protocol: TCP
  selector:
    {{- include "llmsafespace.controller.selectorLabels" . | nindent 4 }}
{{- end }}
