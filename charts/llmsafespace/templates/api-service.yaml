{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llmsafespace.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespace.api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "llmsafespace.api.selectorLabels" . | nindent 4 }}
{{- end }}
