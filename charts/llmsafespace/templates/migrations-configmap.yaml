{{- if .Values.migrations.enabled }}
# Bundle every .sql file under api/migrations/ into a ConfigMap consumed by
# the migrate Job. This avoids requiring the migrate CLI to be present in the
# API image (or building a separate migration image).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llmsafespace.fullname" . }}-migrations
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespace.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
{{ (.Files.Glob "migrations/*.sql").AsConfig | indent 2 }}
{{- end }}
