{{- if and .Values.controller.enabled .Values.controller.inferenceRelay.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-router
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespace.relayRouter.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "llmsafespace.relayRouter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmsafespace.relayRouter.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "llmsafespace.api.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: relay-router
          image: {{ include "llmsafespace.relayRouter.image" . }}
          imagePullPolicy: {{ .Values.controller.inferenceRelay.router.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":8080"
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            {{- toYaml .Values.controller.inferenceRelay.router.resources | nindent 12 }}
          volumeMounts:
            - name: peer-config
              mountPath: /etc/relay-router
              readOnly: true
      volumes:
        - name: peer-config
          configMap:
            name: relay-router-peers
            optional: true
      {{- with .Values.controller.inferenceRelay.router.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.inferenceRelay.router.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.inferenceRelay.router.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
