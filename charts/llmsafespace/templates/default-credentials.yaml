{{- if and .Values.defaultCredentials.enabled (not .Values.defaultCredentials.existingSecret) .Values.defaultCredentials.config }}
apiVersion: v1
kind: Secret
metadata:
  name: workspace-creds-default
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespace.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
    llmsafespace.dev/default-credentials: "true"
type: Opaque
data:
  provider-config: {{ .Values.defaultCredentials.config | b64enc | quote }}
{{- end }}
