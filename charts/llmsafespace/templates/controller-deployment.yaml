{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmsafespace.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespace.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "llmsafespace.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmsafespace.controller.selectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "llmsafespace.controller.serviceAccountName" . }}
      {{- with .Values.controller.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.controller.podSecurityContext | nindent 8 }}
      containers:
        {{- $metricsAddr := .Values.controller.metricsAddr }}
        {{- if and .Values.monitoring.enabled .Values.monitoring.serviceMonitors.enabled }}
        {{- $metricsAddr = "0.0.0.0:8080" }}
        {{- end }}
        - name: manager
          image: {{ include "llmsafespace.controller.image" . }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.controller.containerSecurityContext | nindent 12 }}
          args:
            - --metrics-addr={{ $metricsAddr }}
            - --health-probe-bind-address={{ .Values.controller.probeAddr }}
            {{- if .Values.controller.leaderElection.enabled }}
            - --enable-leader-election=true
            {{- end }}
            {{- with .Values.controller.watchNamespaces }}
            - --watch-namespaces={{ . }}
            {{- end }}
            {{- /* G2 — workspace admission allow-lists. The controller's
                   ValidatingWebhook reads these to gate Spec.Runtime
                   image references and Spec.Storage parameters. Empty
                   allowed-image-registries means "no explicit images
                   allowed" (only RuntimeEnvironment-name references).
                */ -}}
            {{- with .Values.webhooks.allowedImageRegistries }}
            - --allowed-image-registries={{ join "," . }}
            {{- end }}
            {{- with .Values.webhooks.allowedStorageClassNames }}
            - --allowed-storage-class-names={{ join "," . }}
            {{- end }}
            {{- if hasKey .Values.webhooks "maxWorkspaceStorageGi" }}
            - --max-workspace-storage-gi={{ .Values.webhooks.maxWorkspaceStorageGi }}
            {{- end }}
            {{- if hasKey .Values.webhooks "maxWorkspaceCPUMillicores" }}
            - --max-workspace-cpu-millicores={{ .Values.webhooks.maxWorkspaceCPUMillicores }}
            {{- end }}
            {{- if hasKey .Values.webhooks "maxWorkspaceMemoryMi" }}
            - --max-workspace-memory-mi={{ .Values.webhooks.maxWorkspaceMemoryMi }}
            {{- end }}
            {{- if hasKey .Values.webhooks "maxWorkspaceEphemeralStorageGi" }}
            - --max-workspace-ephemeral-storage-gi={{ .Values.webhooks.maxWorkspaceEphemeralStorageGi }}
            {{- end }}
            {{- with .Values.inferenceRelayURL }}
            - --inference-relay-url={{ . }}
            {{- end }}
            {{- /* inferenceRelaySecret is injected via env var from the K8s Secret
                   (see env block below) rather than as a plaintext CLI arg, so it
                   is not visible in `kubectl get pod -o yaml` args. */ -}}
            {{- if and .Values.inferenceRelayURL (or .Values.externalSecret.create .Values.externalSecret.existingSecret) }}
            - --inference-relay-secret=$(INFERENCE_RELAY_SECRET)
            {{- else if .Values.inferenceRelaySecret }}
            {{- /* Fallback for operators not using the managed Secret. */ -}}
            - --inference-relay-secret={{ .Values.inferenceRelaySecret }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ $metricsAddr | regexFind "[0-9]+$" | atoi }}
              protocol: TCP
            - name: probe
              containerPort: {{ .Values.controller.probeAddr | regexFind "[0-9]+$" | atoi }}
              protocol: TCP
            - name: webhook
              containerPort: {{ .Values.controller.webhookPort }}
              protocol: TCP
          {{- with .Values.controller.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.controller.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          {{- /* Inject inference-relay-secret from the managed K8s Secret so it
                 does not appear as a plaintext CLI arg in the pod spec. The
                 controller reads this env var as $(INFERENCE_RELAY_SECRET) in
                 its --inference-relay-secret arg above. */ -}}
          {{- if and .Values.inferenceRelayURL (or .Values.externalSecret.create .Values.externalSecret.existingSecret) }}
          env:
            - name: INFERENCE_RELAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespace.secretName" . }}
                  key: inference-relay-secret
                  optional: true
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.webhooks.enabled }}
            - name: webhook-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.webhooks.enabled }}
        - name: webhook-cert
          secret:
            secretName: {{ include "llmsafespace.fullname" . }}-webhook-cert
            defaultMode: 0444
        {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
