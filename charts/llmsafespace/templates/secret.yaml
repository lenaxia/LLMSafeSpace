{{- if and .Values.externalSecret.create (not .Values.externalSecret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llmsafespace.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespace.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ required "externalSecret.postgresPassword is required when externalSecret.create is true" .Values.externalSecret.postgresPassword | quote }}
  redis-password: {{ default "" .Values.externalSecret.redisPassword | quote }}
  jwt-secret: {{ default (randAlphaNum 64) .Values.externalSecret.jwtSecret | quote }}
{{- end }}
