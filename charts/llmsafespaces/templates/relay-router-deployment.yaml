{{- if and .Values.controller.enabled .Values.controller.inferenceRelay.enabled }}
{{- $wg := .Values.controller.inferenceRelay.router.wireGuard }}
{{- $ingressMode := $wg.ingress.mode }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-router
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.relayRouter.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "llmsafespaces.relayRouter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmsafespaces.relayRouter.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- if eq $ingressMode "hostNetwork" }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        {{ $wg.ingress.hostNetworkNodeSelectorLabel }}: "true"
      {{- else }}
      {{- with .Values.controller.inferenceRelay.router.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      securityContext:
        # fsGroup keeps the wg-config emptyDir readable by the (root) WG
        # sidecar. runAsNonRoot is intentionally NOT set at the pod level so
        # the root WG sidecar (runAsUser: 0) can manage wg0; the router main
        # container enforces non-root for itself.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: relay-router
          image: {{ include "llmsafespaces.relayRouter.image" . }}
          imagePullPolicy: {{ .Values.controller.inferenceRelay.router.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":8080"
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            {{- toYaml .Values.controller.inferenceRelay.router.resources | nindent 12 }}
          volumeMounts:
            - name: peer-config
              mountPath: /etc/relay-router
              readOnly: true
        - name: wireguard
          image: "{{ $wg.image.repository }}:{{ default .Chart.AppVersion $wg.image.tag }}"
          imagePullPolicy: {{ $wg.image.pullPolicy }}
          # Brings up wg0 (10.42.42.1/24) and hot-syncs relay peers. Needs
          # NET_ADMIN to create/manage the wg0 interface and NET_RAW for raw
          # socket ops. Runs as root because netlink/tun operations require it;
          # the WG key-pinning is the real auth boundary, not uid.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          command:
            - /scripts/render-wg.sh
          ports:
            - name: wg-udp
              containerPort: {{ $wg.listenPort }}
              protocol: UDP
          env:
            - name: WG_ADDRESS
              value: {{ $wg.address | quote }}
            - name: WG_LISTEN_PORT
              value: {{ $wg.listenPort | quote }}
            - name: WG_SYNC_INTERVAL
              value: {{ $wg.syncIntervalSeconds | quote }}
          resources:
            {{- toYaml $wg.resources | nindent 12 }}
          volumeMounts:
            - name: wg-scripts
              mountPath: /scripts
              readOnly: true
            - name: wg-config
              mountPath: /etc/wireguard
            - name: wg-secret
              mountPath: /etc/wireguard/secret
              readOnly: true
            - name: peer-config
              mountPath: /etc/relay-router
              readOnly: true
            - name: dev-tun
              mountPath: /dev/net/tun
      volumes:
        - name: peer-config
          configMap:
            name: relay-router-peers
            optional: true
        - name: wg-scripts
          configMap:
            name: relay-router-wg-scripts
            defaultMode: 0755
        - name: wg-config
          emptyDir: {}
        # relay-router-wg holds the router's WG private/public keypair. It is
        # created by the controller (ensureRouterWGKey) on first provision and
        # may not exist at chart-install time, so it is optional.
        - name: wg-secret
          secret:
            secretName: relay-router-wg
            optional: true
        - name: dev-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
      {{- if ne $ingressMode "hostNetwork" }}
      {{- with .Values.controller.inferenceRelay.router.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.inferenceRelay.router.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
{{- end }}
