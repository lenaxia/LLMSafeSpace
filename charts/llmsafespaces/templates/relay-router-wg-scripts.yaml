{{- if and .Values.controller.enabled .Values.controller.inferenceRelay.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: relay-router-wg-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.relayRouter.labels" . | nindent 4 }}
data:
  # render-wg.sh is the WireGuard sidecar entrypoint. It renders wg0.conf from
  # the controller-managed relay-router-wg Secret (router private key) and the
  # relay-router-peers ConfigMap (relay VM public keys + WG IPs), brings wg0
  # up, and hot-syncs peer changes on a poll interval without restarting the
  # pod. This is REQUIRED because the router pod starts at chart-install time,
  # before any InferenceRelay CR exists, so the Secret/ConfigMap arrive late
  # and the controller does NOT restart the router on topology changes
  # (validated: no such code in controller/internal/relay). The poll loop is
  # the mechanism that makes the first end-to-end deploy work.
  render-wg.sh: |
    #!/bin/sh
    # WireGuard sidecar entrypoint for the relay-router (US-42.8).
    set -eu

    SECRET_DIR="/etc/wireguard/secret"
    PEERS_FILE="/etc/relay-router/peers.json"
    WG_DIR="/etc/wireguard"
    WG_CONF="${WG_DIR}/wg0.conf"
    STATE_FILE="/dev/shm/wg-rendered.conf"
    STRIP_FILE="/dev/shm/wg-stripped.conf"

    ADDRESS="${WG_ADDRESS:-10.42.42.1/24}"
    LISTEN_PORT="${WG_LISTEN_PORT:-51820}"
    SYNC_INTERVAL="${WG_SYNC_INTERVAL:-5}"

    log() { echo "$(date -u +%FT%TZ) [wg-sidecar] $*"; }

    have_jq() { command -v jq >/dev/null 2>&1; }

    # render_conf prints a fresh wg0.conf to stdout, or returns 1 when there is
    # no private key yet (controller has not provisioned any relay VM).
    render_conf() {
      priv="${SECRET_DIR}/privateKey"
      [ -s "$priv" ] || return 1

      printf '[Interface]\n'
      printf 'PrivateKey = %s\n' "$(cat "$priv")"
      printf 'Address = %s\n' "$ADDRESS"
      printf 'ListenPort = %s\n\n' "$LISTEN_PORT"

      if [ -s "$PEERS_FILE" ] && have_jq; then
        # One [Peer] block per relay VM. AllowedIPs is the peer's WG IP /32 so
        # traffic to 10.42.42.x routes through the right tunnel. Skip relays
        # with no public key yet (provisioning, not yet healthy).
        jq -r '.relays[]? | select(.publicKey != null and .publicKey != "") |
               "[Peer]\nPublicKey = \(.publicKey)\nAllowedIPs = \(.wgIP)/32\n"' \
          "$PEERS_FILE"
      fi
    }

    apply_conf() {
      # render_conf writes the candidate config to WG_CONF.
      if ! render_conf > "$WG_CONF"; then
        log "waiting for router WG private key (relay-router-wg Secret)"
        return 0
      fi

      # First time: bring the interface up (sets Address + routes). Afterwards
      # apply peer-only / key changes live via `wg syncconf` without dropping
      # the tunnel (in-flight streams survive). wg syncconf reads a stripped
      # config (no wg-quick-only directives like Address) from a file, written
      # to the writable /dev/shm since the root filesystem is read-only. The
      # state file is updated ONLY on a successful apply, so a failed sync
      # retries on the next tick instead of being masked as "applied".
      if ip link show wg0 >/dev/null 2>&1; then
        if ! [ -f "$STATE_FILE" ] || ! cmp -s "$WG_CONF" "$STATE_FILE"; then
          if wg-quick strip wg0 > "$STRIP_FILE" 2>/dev/null; then
            if wg syncconf wg0 "$STRIP_FILE"; then
              cp "$WG_CONF" "$STATE_FILE"
              log "synced updated WireGuard config"
            else
              log "wg syncconf failed; will retry next tick"
            fi
          fi
        fi
      else
        if wg-quick up wg0; then
          cp "$WG_CONF" "$STATE_FILE"
          log "brought up wg0 on ${ADDRESS} (listen ${LISTEN_PORT}/udp)"
        else
          log "wg-quick up failed; will retry next tick"
        fi
      fi
    }

    log "starting (address=${ADDRESS} listen=${LISTEN_PORT}/udp sync=${SYNC_INTERVAL}s)"
    if ! have_jq; then
      log "WARNING: jq not present in image — peers from ${PEERS_FILE} will not be configured. " \
          "Use an image providing wireguard-tools, iproute2 and jq (see values.yaml wireGuard.image)."
    fi

    while true; do
      apply_conf || true
      sleep "$SYNC_INTERVAL"
    done
{{- end }}
