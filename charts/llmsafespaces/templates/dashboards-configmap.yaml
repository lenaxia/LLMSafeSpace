{{- if and .Values.monitoring.enabled .Values.monitoring.dashboards.enabled }}
{{- /*
  Build release-derived job-label patterns so dashboard PromQL matches the
  ServiceMonitors actually deployed. The api ServiceMonitor's `job` label is
  the Service name (`<fullname>-api`); the controller ServiceMonitor's `job`
  label is `<fullname>-controller-metrics`. Use the `.*` regex suffix to
  tolerate Service-name suffixes (e.g. headless variants) and to match the
  pattern used in prometheus-rules.yaml.

  The dashboard JSON files contain PLACEHOLDER strings (__LLMSAFESPACES_*_JOB__)
  rather than Helm template directives. This avoids a clash between Grafana's
  legend-template syntax (`{{model_id}}` and similar) and Helm's `tpl` parser:
  the dashboards have hundreds of `{{ }}` strings that are NOT Helm directives,
  and `tpl` would fail to parse them. Simple string substitution via the
  `replace` pipeline avoids that problem entirely.

  See worklog NNNN_2026-06-23_grafana-dashboard-job-vars-portable for context.
*/ -}}
{{- $apiJob := printf "%s-api.*" (include "llmsafespaces.fullname" .) -}}
{{- $ctrlJob := printf "%s-controller.*" (include "llmsafespaces.fullname" .) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-grafana-dashboards
  namespace: {{ default .Release.Namespace .Values.monitoring.dashboards.namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
    {{- with .Values.monitoring.dashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.monitoring.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{- range $path, $_ := .Files.Glob "dashboards/**.json" }}
  {{ base $path }}: |-
{{ $.Files.Get $path | replace "__LLMSAFESPACES_API_JOB__" $apiJob | replace "__LLMSAFESPACES_CTRL_JOB__" $ctrlJob | indent 4 }}
  {{- end }}
{{- end }}
