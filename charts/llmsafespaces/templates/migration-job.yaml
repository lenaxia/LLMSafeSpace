{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "llmsafespaces.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.api.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: "{{ .Values.migrations.image.repository | default "migrate/migrate" }}:{{ .Values.migrations.image.tag | default "v4.17.1" }}"
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
          # The migrate image's entrypoint is `migrate`. Pass everything as args.
          # Use the libpq KV connection-string form, NOT a postgres:// URL.
          # K8s $(VAR) substitution is a literal string replace with no
          # URL-encoding, so a postgres:// URL embeds the password raw and
          # breaks when it contains URL-reserved chars (/ ? # @ : % + =) —
          # which is common (e.g. `openssl rand -base64`). The KV form splits
          # on whitespace and '=' and never needs encoding. See issue #424.
          args:
            - -path=/migrations
            - -database
            - host=$(DB_HOST) port=$(DB_PORT) user=$(DB_USER) password=$(DB_PASSWORD) dbname=$(DB_NAME) sslmode=$(DB_SSLMODE)
            - up
          env:
            - name: DB_HOST
              value: {{ .Values.postgresql.host | quote }}
            - name: DB_PORT
              value: {{ .Values.postgresql.port | quote }}
            - name: DB_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: DB_NAME
              value: {{ .Values.postgresql.database | quote }}
            - name: DB_SSLMODE
              value: {{ .Values.postgresql.sslMode | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmsafespaces.secretName" . }}
                  key: postgres-password
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      volumes:
        - name: migrations
          configMap:
            name: {{ include "llmsafespaces.fullname" . }}-migrations
{{- end }}
