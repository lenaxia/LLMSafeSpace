{{- if and .Values.frontend.enabled .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "llmsafespaces.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llmsafespaces.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- with .Values.frontend.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.frontend.ingress.className }}
  ingressClassName: {{ .Values.frontend.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.frontend.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmsafespaces.fullname" . }}-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmsafespaces.fullname" . }}-frontend
                port:
                  name: http
    {{- range .Values.frontend.ingress.additionalHosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmsafespaces.fullname" $ }}-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmsafespaces.fullname" $ }}-frontend
                port:
                  name: http
    {{- end }}
  {{- if .Values.frontend.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.frontend.ingress.host | quote }}
      secretName: {{ .Values.frontend.ingress.tlsSecret | default (printf "%s-frontend-tls" (include "llmsafespaces.fullname" .)) }}
    {{- range .Values.frontend.ingress.additionalHosts }}
    - hosts:
        - {{ .host | quote }}
      secretName: {{ .tlsSecret | default (printf "%s-tls" (.host | replace "." "-")) }}
    {{- end }}
  {{- end }}
{{- end }}
