# Cluster-specific Helm values for the home-kubernetes deployment.
# Override defaults that don't fit this cluster (Redis named valkey,
# traefik ingress, no cluster-internal DNS named redis-master, etc.)

# Pin all components to the same commit so they reconcile against
# matching CRD schema and protocol expectations. ts-1781197595 includes:
#   - fix(controller): register custom metrics with controller-runtime registry (#110)
#   - fix(repolint): resolve worklog 0227 collision (#109)
#   - feat(monitoring): Grafana dashboards, Prometheus alerts, ServiceMonitors (#108)
api:
  image:
    tag: ts-1781197595
    pullPolicy: Always
  ingress:
    # API is exposed via the frontend ingress at /api; no separate
    # api-only ingress needed.
    enabled: false

controller:
  image:
    tag: ts-1781197595
    pullPolicy: Always

# inferenceRelayURL is the Cloudflare Worker base URL for free-tier inference.
# inferenceRelaySecret is passed at deploy time via --set (not stored here).
inferenceRelayURL: https://relay.safespaces.dev

# The cluster runs Valkey, not Bitnami Redis. The chart default
# (`redis-master`) does not resolve in this namespace.
redis:
  host: valkey
  port: 6379

# Disable MCP — image llmsafespace/mcp:0.1.0 doesn't exist on the
# registry and we're not using MCP yet.
mcp:
  enabled: false

# Frontend + ingress for safespace.thekao.cloud.
frontend:
  enabled: true
  image:
    tag: ts-1781197595
    pullPolicy: Always
  ingress:
    enabled: true
    className: traefik
    host: safespace.thekao.cloud
    tls: true
    # Match cluster cert-manager pattern used by tinyrsvp/ogcs.
    # Annotations override the chart defaults (which are nginx-only)
    # so we don't ship X-Frame-Options via configuration-snippet here;
    # traefik handles those via Middleware CRDs separately if needed.
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-production
      traefik.ingress.kubernetes.io/router.entrypoints: websecure

runtimeEnvironments:
  base:
    image:
      tag: ts-1781197595

# Webhook image-registry allow-list — required so the controller's
# RuntimeEnvironment validating webhook accepts ghcr.io images.
# The default values.yaml already includes this, but we re-state
# explicitly so it survives any future chart-default changes.
webhooks:
  enabled: true
  allowedImageRegistries:
    - "ghcr.io/lenaxia/"

# Cluster-scoped RBAC. The controller watches workspaces, pods, and
# secrets across all namespaces, so it needs ClusterRole-backed
# list/watch permissions. Without this the controller-runtime
# informer cache cannot sync and the controller CrashLoopBackOffs
# during startup ("failed to wait for workspace caches to sync").
rbac:
  scope: cluster

# Monitoring: Grafana dashboards, Prometheus alerting rules, and
# ServiceMonitors for API and controller. The cluster runs
# kube-prometheus-stack in the `monitoring` namespace with empty
# selectors (picks up all ServiceMonitors/PrometheusRules across all
# namespaces). Grafana sidecar imports dashboards via the
# `grafana_dashboard: "1"` label.
monitoring:
  enabled: true
  dashboards:
    enabled: true
    namespace: default
  prometheusRules:
    enabled: true
    namespace: default
  serviceMonitors:
    enabled: true
    namespace: default
