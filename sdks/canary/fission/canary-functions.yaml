---
# ── TimeTriggers (1-minute schedule for shallow canaries) ──────────────────

apiVersion: fission.io/v1
kind: TimeTrigger
metadata:
  name: tt-canary-s-health
  namespace: fission
spec:
  cron: "* * * * *"
  functionref:
    type: name
    name: canary-s-health

---
apiVersion: fission.io/v1
