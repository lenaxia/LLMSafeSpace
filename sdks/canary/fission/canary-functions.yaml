---
# ── Secret (template — fill in values) ───────────────────────────────────────

# Create with:
#   kubectl create secret generic llmsafespaces-canary-secrets \
#     --namespace fission \
#     --from-literal=LLMSAFESPACES_URL=https://your.instance.example.com \
#     --from-literal=LLMSAFESPACES_API_KEY=lsp_... \
#     --from-literal=LLMSAFESPACES_EMAIL=canary1@llmsafespaces.test \
#     --from-literal=LLMSAFESPACES_PASSWORD=... \
#     --from-literal=LLMSAFESPACES_API_KEY_USER2=lsp_... \
#     --from-literal=LLMSAFESPACES_LLM_PROVIDER=anthropic \
#     --from-literal=LLMSAFESPACES_LLM_API_KEY=sk-... \
#     --from-literal=LLMSAFESPACES_LLM_MODEL=anthropic/claude-haiku-4-5
