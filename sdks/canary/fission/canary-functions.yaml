# Fission function manifests for SDK canaries
# Deploy with: kubectl apply -f sdks/canary/fission/
#
# Prerequisites:
#   1. Fission installed (https://fission.io)
#   2. Go environment "go-env" created:
#      fission env create --name go-env --image fission/go-env:latest --builder fission/go-builder:latest
#   3. Canary binary container image built and pushed to registry (see Makefile)
#   4. Secret "llmsafespaces-canary-secrets" containing env vars
#
# Test user accounts (non-admin) must be provisioned before deploying.
# See sdks/canary/README.md for bootstrap instructions.

---
# ── Shallow canaries (every 1 minute) ────────────────────────────────────────

apiVersion: fission.io/v1
kind: Package
metadata:
  name: canary-go-shallow
  namespace: fission
spec:
  environment:
    name: go-env
    namespace: fission
  source:
    type: url
    url: ""  # set via CI deployment: fission pkg update --src canary-go-shallow.zip
  deployment:
    type: url
    url: ""

---
apiVersion: fission.io/v1
kind: Function
metadata:
  name: canary-s-health
  namespace: fission
spec:
  environment:
    name: go-env
    namespace: fission
  package:
    packageref:
      name: canary-go-shallow
      namespace: fission
    functionName: scenarios/s-health
  resources: {}
  secretmaps:
    - name: llmsafespaces-canary-secrets

---
apiVersion: fission.io/v1
kind: Function
metadata:
  name: canary-s-auth
  namespace: fission
spec:
  environment:
    name: go-env
    namespace: fission
