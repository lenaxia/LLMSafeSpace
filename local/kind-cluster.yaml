# Local kind cluster for LLMSafeSpaces end-to-end testing.
# Single-node cluster; sandbox pods + control plane run on the same node.
# This is a development tool, NOT a production layout.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: llmsafespaces
nodes:
  - role: control-plane
    extraPortMappings:
      # Map host port 8080 to a NodePort on the cluster so the API is
      # reachable from the host without `kubectl port-forward`.
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # cert-manager webhook traffic is internal; no host mapping needed.
networking:
  # kind defaults to disableDefaultCNI=false and uses kindnet, which works
  # for our purposes (no NetworkPolicy enforcement is required for these
  # tests since chart's networkPolicy.enabled defaults to false).
  apiServerAddress: "127.0.0.1"
