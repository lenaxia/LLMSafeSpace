---
# Minimal Postgres + Redis for kind-based local testing of LLMSafeSpace.
# THIS IS A DEVELOPMENT-ONLY LAYOUT. Do NOT use in production:
#   - PVC sized at 1Gi (no resize semantics tested)
#   - Postgres password is in plain ConfigMap-style env (acceptable only in
#     a single-developer kind cluster)
#   - No backup, no replication, no monitoring, no resource limits enforced
#   - postgres image is :17-alpine (lightweight; production should pin digest)
apiVersion: v1
kind: Namespace
metadata:
  name: llmsafespace
---
# ============================================================================
# Postgres
# ============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: llmsafespace
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: llmsafespace
  labels: { app.kubernetes.io/name: postgres }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: postgres }
  template:
    metadata:
      labels: { app.kubernetes.io/name: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - name: POSTGRES_DB
              value: llmsafespace
            - name: POSTGRES_USER
              value: llmsafespace
            - name: POSTGRES_PASSWORD
              value: changeme
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - { name: postgres, containerPort: 5432 }
          readinessProbe:
            exec:
              command: [pg_isready, -U, llmsafespace, -d, llmsafespace]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: [pg_isready, -U, llmsafespace, -d, llmsafespace]
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: llmsafespace
spec:
  type: ClusterIP
  ports:
    - { name: postgres, port: 5432, targetPort: postgres }
  selector: { app.kubernetes.io/name: postgres }
---
# ============================================================================
# Redis
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  namespace: llmsafespace
  labels: { app.kubernetes.io/name: redis }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: redis }
  template:
    metadata:
      labels: { app.kubernetes.io/name: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          # Persistence is intentionally OFF for kind-only dev.
          # If you want it, add: --save 60 1 --appendonly yes
          args: [redis-server, --save, ""]
          ports:
            - { name: redis, containerPort: 6379 }
          readinessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: llmsafespace
spec:
  type: ClusterIP
  ports:
    - { name: redis, port: 6379, targetPort: redis }
  selector: { app.kubernetes.io/name: redis }
