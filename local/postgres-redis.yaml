---
# Minimal Postgres + Valkey for kind-based local testing of LLMSafeSpace.
# THIS IS A DEVELOPMENT-ONLY LAYOUT. Do NOT use in production:
#   - PVC sized at 1Gi (no resize semantics tested)
#   - No backup, no replication, no monitoring
#   - postgres image pinned to :17-alpine but not by digest
#
# G26 (Epic 17 worklog 0089 RT-4.5) — passwords are read from the same
# `llmsafespace-credentials` Secret the chart auto-generates. The chart
# must be installed first (it ships the Secret as a pre-install hook
# with helm.sh/hook-weight=-15). If you apply this manifest before the
# chart, the postgres pod will CrashLoopBackoff with "POSTGRES_PASSWORD
# environment variable is required" — that's the desired fail-loud
# behaviour (no silent fallback to "changeme").
#
# Pod labels match `charts/llmsafespace/templates/datastore-network-policy.yaml`'s
# selectors (`app: postgres`, `app: valkey`). Renaming/changing those
# labels here without also updating the NetPol selectors will break
# in-namespace ingress for both API and the migration Job.
apiVersion: v1
kind: Namespace
metadata:
  name: llmsafespace
---
# ============================================================================
# Postgres
# ============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: llmsafespace
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: llmsafespace
  labels:
    app: postgres
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - name: POSTGRES_DB
              value: llmsafespace
            - name: POSTGRES_USER
              value: llmsafespace
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llmsafespace-credentials
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - { name: postgres, containerPort: 5432 }
          readinessProbe:
            exec:
              command: [pg_isready, -U, llmsafespace, -d, llmsafespace]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: [pg_isready, -U, llmsafespace, -d, llmsafespace]
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: llmsafespace
spec:
  type: ClusterIP
  ports:
    - { name: postgres, port: 5432, targetPort: postgres }
  selector:
    app: postgres
---
# ============================================================================
# Valkey (Redis-compatible). Authenticated via REDIS_PASSWORD from the
# chart's credentials Secret; valkey runs with --requirepass enforced.
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: llmsafespace
  labels:
    app: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          # Use sh -c so the shell expands $REDIS_PASSWORD before
          # valkey-server starts. exec keeps PID 1 as valkey for proper
          # signal handling.
          command: [/bin/sh]
          args:
            - "-c"
            - 'exec valkey-server --save "" --requirepass "$REDIS_PASSWORD"'
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llmsafespace-credentials
                  key: redis-password
          ports:
            - { name: valkey, containerPort: 6379 }
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'valkey-cli -a "$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG'
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: valkey }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: llmsafespace
spec:
  type: ClusterIP
  ports:
    - { name: valkey, port: 6379, targetPort: valkey }
  selector:
    app: valkey
---
# Backwards-compatibility alias for charts/clusters that still reference
# `redis-master` as the host name. Selecting via `app: valkey` keeps both
# Service names backed by the same Deployment.
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: llmsafespace
spec:
  type: ClusterIP
  ports:
    - { name: redis, port: 6379, targetPort: valkey }
  selector:
    app: valkey
