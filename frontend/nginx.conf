server {
    # Listen on 8080 (unprivileged port). The container runs as UID 101
    # (nginx) which cannot bind <1024; the K8s Service maps the public
    # port 80 -> 8080 via targetPort. See frontend/Dockerfile.
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — but NOT for /api (those should 404 if they reach nginx,
    # meaning the ingress routing is misconfigured)
    location /api/ {
        return 502;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html, env.json, or the service worker.
    # sw.js must be no-store so browsers always fetch the latest version;
    # a cached sw.js prevents update detection from firing entirely.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /env.json {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /manifest.webmanifest {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
