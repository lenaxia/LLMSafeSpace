# gitleaks configuration for LLMSafeSpaces.
#
# Extends the default ruleset (rules: jwt, generic-api-key, private-key,
# curl-auth-header, etc. — see https://github.com/gitleaks/gitleaks for
# the full list).
#
# We allow-list known-safe patterns rather than weakening the rules.
# Any new path added below MUST cite a specific reason — "looks like a
# test file" is not enough; the file content must demonstrably never
# contain a real secret. Real PRs wanting to add a credential should
# fail the gate; this is the entire point.

title = "LLMSafeSpaces gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Known-safe paths and content. See per-entry rationale."

# Files whose entire purpose is to demonstrate redaction or contain
# documented test fixtures. Each file's leak content is part of the
# test corpus and must not change behavior if "leaked".
paths = [
  # Redaction package test corpus — patterns are explicitly the strings
  # the redactor must catch. False positive by construction.
  '''pkg/redact/redact_test\.go''',
  '''pkg/utilities/utilities_test\.go''',
  # Auth tests use canonical "test-secret" / "test-jwt-secret" strings;
  # never a real signing key (verified by inspection 2026-05-31).
  '''api/internal/services/auth/auth_test\.go''',
  '''api/internal/services/auth/auth_settings_test\.go''',
  '''api/internal/middleware/tests/logging_test\.go''',
  # Synthetic test fixtures for the auth-method classifier. Tokens are
  # short, low-entropy, and explicitly invalid — they exist only to
  # exercise the prefix/shape branches of authMethodForToken. Verified
  # 2026-06-22 (worklog 0508): the lsp_ value is 16 'a' chars, the JWT
  # uses {alg:none} and a single-char signature.
  '''api/internal/middleware/auth_method_test\.go''',
  # Worklog 0030 documents a real e2e test run; the JWT shown is a
  # short-lived test token bound to localhost. Worklog 0089 is the
  # epic-17 phase-4 audit narrative — it cites secret patterns the
  # auditor was checking for, not real secrets. Worklog 0181 documents
  # the Cloudflare Worker inference-relay secret generated and deployed
  # in that session. Already deployed to the cluster; rotation is tracked
  # separately. Infrastructure secret for a rate-limited free-tier relay,
  # not an API key with billing/data access.
  '''worklogs/0030_2026-05-23_e2e-prompt-flow-validated\.md''',
  '''worklogs/0089_2026-05-30_epic17-phase-4-credential-crypto\.md''',
  '''worklogs/0181_2026-06-07_relay-secret-automation-model-selector-fix\.md''',
  # Worklog 0182 documents the relay secret recovery from the previous
  # session (0181). The CF Worker secret shown was already deployed to
  # the cluster; rotation tracked separately.
  '''worklogs/0182_2026-06-07_relay-secret-automation-model-selector-fix\.md''',
  # Epic-17 security audit artifacts: findings, harnesses, evidence.
  # By definition these document security patterns; gitleaks would
  # flag the audit's own demonstrations as secrets.
  '''design/stories/epic-17-security-review/.*''',
  # Old design doc with an example curl invocation.
  '''design/0004_2025-03-05_warmingpool\.md''',
  # Local-development test harness; uses lsp_test... API keys that
  # exist only in a developer's local Postgres.
  '''local/test\.sh''',
  # Build artifact (minified JS); generated, never committed by hand.
  # Already in .gitignore but kept here as defense in depth.
  '''frontend/dist/.*''',
  # Epic-34 master-key test file: uses LLMSAFESPACES_MASTER_SECRET env var
  # with synthetic test values (high-entropy but not real secrets — test fixture
  # for the master-key encryption round-trip. No real key material; verified
  # by inspection 2026-06-08).
  '''api/internal/app/app_master_key_test\.go''',
  # SecretsTab generates SSH keypairs client-side using WebCrypto.
  # The PEM header/footer strings ("-----BEGIN OPENSSH PRIVATE KEY-----")
  # are format templates, not actual secrets. No real key material is
  # stored in this file.
  '''frontend/src/components/settings/SecretsTab\.tsx''',
  # LLM provider format tests use synthetic "sk-ant-123" / "sk-oai-456"
  # test keys. Never real credentials (verified by inspection 2026-06-02).
  '''pkg/agent/opencode/format_test\.go''',
  # LLM provider E2E handler tests use synthetic test keys for
  # encrypt/decrypt round-trip validation.
  '''api/internal/handlers/secrets_llmprovider_test\.go''',
  '''api/internal/handlers/models_test\.go''',
  # DEK wrapping tests use synthetic lsp_a1b2c3... / lsp_000... keys
  # for encrypt/decrypt round-trips. Never real credentials.
  '''api/internal/services/auth/auth_apikey_dek_test\.go''',
  # Epic 10 design docs contain example API key patterns in code
  # snippets and architecture diagrams. Never real credentials.
  '''design/stories/epic-10-multi-tenant-trust/.*''',
  # ApiKeysTab.test.tsx uses a synthetic lsp_ key fixture
  # ("llmsk_abcdef1234567890...") to exercise the one-time key banner
  # copy flow. The string is a fixed-length hex placeholder constructed
  # to look like a real key for UI testing; it is not a real credential
  # and is not valid against any running instance (verified by inspection
  # 2026-06-11).
  '''frontend/src/components/settings/ApiKeysTab\.test\.tsx''',
  # Epic-38 architectural remediation stories contain Go code snippets
  # with synthetic API key literals (e.g. "ak_live_abcdef123456") used
  # as test fixture examples in implementation guidance. These are
  # documentation placeholders — not real credentials and not valid
  # against any running instance (verified by inspection 2026-06-12).
  '''design/stories/epic-38-architectural-remediation/.*''',
  # Relay reconciler RSA key parser uses the PEM header/footer strings
  # ("-----BEGIN RSA PRIVATE KEY-----") as format templates when
  # normalizing user-provided PEM input. No real key material is stored
  # in this file — it's code that handles the PEM format, not a secret.
  '''controller/internal/relay/rsa\.go''',
  # Auth-method classification test (PR #356) uses two synthetic test
  # fixtures to exercise authMethodForToken across its branches:
  #   - "lsp_aabbccdd...0011223344" — a 40-hex-digit fake LSP-prefixed
  #     API key. Not a real credential; not valid against any running
  #     instance. Constructed to match the LSP_ prefix shape the
  #     classifier inspects.
  #   - "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1MSJ9.signature" — a
  #     structurally-invalid JWT with the literal text "signature" in
  #     place of a real HS256 MAC. The header decodes to {"alg":"HS256"}
  #     and the payload to {"sub":"u1"}; both are trivial documentation
  #     placeholders. The classifier branches on shape only — it does
  #     NOT verify the signature, which is fortunate because there
  #     isn't one.
  # Both fixtures are gitleaks false positives: they look like the real
  # thing because the test exists to prove the classifier handles real-
  # looking shapes, but neither has any secret material. Verified by
  # inspection 2026-06-22.
  '''api/internal/middleware/auth_method_test\.go''',
]

# Allow specific regex patterns in any file. Use sparingly; prefer
# adding the file path to `paths` when possible.
regexes = [
  # The test-only JWT secret literal used across the test suite.
  # If a new file is added that uses a *different* test secret, prefer
  # changing it to this one rather than expanding the allowlist.
  '''test-secret-key-for-llmsafespaces-only''',
  # Sample API-key prefix used in worklogs and SDK examples. Real
  # API keys have an additional 32 random bytes after the prefix.
  '''lsp_(test|example|placeholder|demo)[A-Za-z0-9_]*''',
  # Documentation placeholder for "put your real key here". Pre-dates
  # this file (origin: WARMINGPOOL.md from 2025-03), still in git
  # history. Not a real credential.
  '''YOUR_API_KEY''',
]

# Specific commits whose findings are documented false positives.
# Each entry MUST cite the commit, the file, the rule, and *why* the
# finding is not a real secret. Prefer fixing the source; use this
# only when the finding is in immutable git history.
commits = [
  # d1c7242 introduced the worklog 0125 "Verified manually" curl
  # snippet which used the literal placeholder
  # `curl -u 'opencode:<password>'`. The angle-bracketed
  # `<password>` is a documentation placeholder, not a real
  # credential — but gitleaks's `curl-auth-user` rule fires on the
  # syntactic shape regardless. The follow-up commit on this branch
  # rewrote the worklog to prose so the issue cannot recur on
  # working-tree scans, but the `--no-git` scan in the security
  # workflow walks history and re-finds the original commit.
  # Fingerprint covers the exact line; broader history scanning is
  # still in effect.
  "d1c72424c3e3feb63427fb8c4718a150f9d4b785",
  # fec3363 (Bug 3 fix worklog 0128) repeated the same pattern:
  # `curl -u 'opencode:<password>'` placeholder in the
  # "Live cluster (manual probe of the new shape)" section.
  # Same rationale as d1c7242 — opencode is the well-known Basic-auth
  # username in our system, <password> is a literal placeholder.
  # The follow-up commit rewrote the worklog to prose; this entry
  # silences history scans of the original commit.
  "fec33638b931175136a04a42285b97cb33be901b",
  # b45dab6 (worklog 0181) documents the Cloudflare Worker inference-relay
  # secret value generated, stored in the cluster K8s Secret, and pushed
  # to the CF Worker in that session. Already deployed; rotation is tracked
  # separately. It is an infrastructure secret for a rate-limited free-tier
  # relay — not an API key with billing/data access. Documented in the
  # worklog as context for the rotation procedure.
  "b45dab6def0ee0d16817f48feafef780f7ee74d8",
]

# Stop-words: matches that, when seen alongside a candidate secret,
# disprove the match (e.g. "example", "placeholder").
stopwords = [
  "example",
  "placeholder",
  "test",
  "fake",
  "dummy",
  "redacted",
]
